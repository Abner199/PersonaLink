[build]
  command = "npm install && cd backend && npm install && cd .. && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# Proxy /api/* requests to the serverless function (preserves original path)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

# SPA fallback: all other routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
