name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          # API URL：部署Netlify后，将Netlify站点URL填入此Secret
          # GitHub仓库 > Settings > Secrets and variables > Actions > New repository secret
          # Name: VITE_API_URL   Value: https://your-app.netlify.app/api
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          # 仓库子路径。若仓库名为PersonaLink，则设为 /PersonaLink/
          # GitHub仓库 > Settings > Secrets and variables > Actions > Variables > VITE_BASE_URL
          VITE_BASE_URL: ${{ vars.VITE_BASE_URL || '/' }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
